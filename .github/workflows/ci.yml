name: 'CI'

on:
  pull_request:
    branches: ['main', 'dev']
  push:
    branches: ['main', 'dev']

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: 'Type check & build'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'actions/setup-node@v5'
        with:
          node-version: '22'
          cache: 'npm'

      # package-lock.json 기준 정확한 재현 설치 (lock 재생성 금지 — AGENTS.md 규칙 3)
      - name: 'Install dependencies'
        run: 'npm ci'

      # 서식·린트 검사. 실패해도 빌드 결과는 확인할 수 있도록 build보다 앞에 두되
      # continue-on-error는 쓰지 않는다 (규칙은 강제되어야 의미가 있다).
      - name: 'Format check'
        run: 'npm run format:check'

      - name: 'Lint'
        run: 'npm run lint'

      # vue-tsc 타입체크 + vite 빌드. AGENTS.md의 "커밋 전 build 통과" 규칙을 CI에서 강제한다.
      - name: 'Type check & build'
        run: 'npm run build'
