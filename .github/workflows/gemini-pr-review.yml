name: 'Gemini PR Review'

on:
  pull_request:
    types: ['opened', 'reopened', 'synchronize']
  issue_comment:
    types: ['created']

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    # PR 이벤트이거나, PR 코멘트에 "@gemini-cli /review"가 있을 때만 실행
    if: |-
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@gemini-cli /review'))
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v5'
        with:
          persist-credentials: 'false'

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          # 무료 티어는 Flash 계열만 지원한다. Pro로 바꾸면 유료 결제가 필요하다.
          # 레포 Variables에 GEMINI_MODEL을 넣으면 그 값이 우선한다.
          gemini_model: '${{ vars.GEMINI_MODEL || ''gemini-3.5-flash'' }}'
          workflow_name: 'gemini-pr-review'
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/pr-code-review'
