name: 'Gemini PR Review'

on:
  pull_request:
    # synchronize(추가 푸시)는 일부러 뺐다 — 커밋마다 리뷰가 달리면 노이즈·쿼터 낭비가 크다.
    # 푸시마다 돌리고 싶으면 'synchronize'를 추가하면 된다.
    types: ['opened', 'reopened']
  issue_comment:
    types: ['created']

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    if: |-
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@gemini-cli /review'))
    runs-on: 'ubuntu-latest'
    timeout-minutes: 8
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    env:
      GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      PR_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v5'

      - name: 'Collect PR diff'
        run: |-
          mkdir -p .gemini
          gh pr diff "${PR_NUMBER}" --patch > .gemini/pr.diff
          gh pr view "${PR_NUMBER}" --json title,body,files \
            > .gemini/pr.json
          wc -l .gemini/pr.diff

      - name: 'Run Gemini review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          # 무료 티어는 Flash 계열만 지원한다. Pro로 바꾸면 유료 결제가 필요하다.
          gemini_model: '${{ vars.GEMINI_MODEL || ''gemini-3.5-flash'' }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 12
              },
              "tools": {
                "core": ["read_file", "write_file", "glob", "search_file_content"]
              }
            }
          prompt: |-
            너는 이 저장소의 코드 리뷰어다. `.gemini/pr.diff`가 이번 PR의 전체
            diff이고, `.gemini/pr.json`에 제목·본문·변경 파일 목록이 있다.
            저장소 루트의 GEMINI.md에 프로젝트 규칙이 있다. 이 세 파일을 먼저 읽어라.
            diff만으로 맥락이 부족하면 관련 소스 파일을 직접 열어 확인해라.

            리뷰 범위는 다음 두 축이다. 둘 다 본다.

            1. GEMINI.md의 "절대 규칙" 위반. 이건 발견 시 반드시 지적하고
               Critical 또는 High로 분류한다.
            2. 일반적인 코드 품질. 규칙 위반이 없어도 아래는 항상 검토해라.
               - 버그·로직 오류·엣지 케이스 누락 (빈 배열, null, 0, 동시성)
               - 타입 안정성 (any 사용, 단언 남용, 좁혀지지 않은 유니온)
               - 에러 처리 누락, 실패 경로에서의 사용자 피드백 부재
               - 비동기 처리 (경쟁 조건, 정리되지 않는 타이머·구독·리스너)
               - 불필요한 재연산·재렌더 등 성능 문제
               - 접근성 (키보드 조작, 대체 텍스트, 포커스 관리)
               - 테스트가 필요한데 없는 변경

            리뷰 결과를 `.gemini/review.md` 파일에 마크다운으로 작성해라.
            이 파일의 내용이 그대로 PR 코멘트로 게시되므로, 인사말이나
            "작성했습니다" 같은 메타 문장 없이 리뷰 본문만 담아야 한다.

            형식:
            - 맨 위에 이 PR이 무엇을 하는 변경인지 2~3줄 요약. 지적 사항이
              없더라도 이 요약은 항상 쓴다.
            - 그 아래 지적 사항을 심각도(Critical / High / Medium / Low)별로 묶어라.
            - 각 항목은 `파일경로:라인` 을 밝히고, 무엇이 왜 문제인지 한 문단으로
              설명한 뒤 수정된 코드 예시를 코드블록으로 제시해라.
            - 확신이 없는 지적은 "확인 필요" 항목으로 따로 모아 질문 형태로 적어라.
            - 단순 취향 차이나 사소한 네이밍은 적지 마라.
            - 정말로 지적할 것이 없으면 요약 아래에 "지적 사항 없음" 한 줄만 쓴다.
              단, 억지로 만들어내지도 말고 검토를 생략하지도 마라.

            한국어로 작성해라. 이모지는 절대 사용하지 마라. 체크마크나 경고
            표시 같은 장식 기호도 쓰지 말고, 심각도는 텍스트로만 표기해라.
            반드시 write_file 도구로 `.gemini/review.md`를 생성해야 하며,
            그 외의 파일은 수정하지 마라.

      - name: 'Post review as PR comment'
        if: 'always()'
        run: |-
          if [ ! -s .gemini/review.md ]; then
            echo "리뷰 파일이 비어 있거나 생성되지 않았다 — 코멘트를 건너뛴다." >&2
            exit 1
          fi
          {
            echo "## Gemini 코드 리뷰"
            echo
            cat .gemini/review.md
            echo
            echo "---"
            echo "<sub>\`${GEMINI_MODEL:-gemini-3.5-flash}\` · 다시 실행하려면 \`@gemini-cli /review\` 코멘트</sub>"
          } > .gemini/comment.md
          gh pr comment "${PR_NUMBER}" --body-file .gemini/comment.md
        env:
          GEMINI_MODEL: '${{ vars.GEMINI_MODEL }}'
