name: 'Gemini PR Review'

on:
  pull_request:
    # synchronize(추가 푸시)는 일부러 뺐다 — 커밋마다 리뷰가 달리면 노이즈·쿼터 낭비가 크다.
    # 푸시마다 돌리고 싶으면 'synchronize'를 추가하면 된다.
    types: ['opened', 'reopened']
  issue_comment:
    types: ['created']

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    if: |-
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@gemini-cli /review'))
    runs-on: 'ubuntu-latest'
    timeout-minutes: 8
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    env:
      GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      PR_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v5'

      - name: 'Collect PR diff'
        run: |-
          mkdir -p .gemini
          gh pr diff "${PR_NUMBER}" --patch > .gemini/pr.diff
          gh pr view "${PR_NUMBER}" --json title,body,files \
            > .gemini/pr.json
          wc -l .gemini/pr.diff

      - name: 'Run Gemini review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          # 무료 티어는 Flash 계열만 지원한다. Pro로 바꾸면 유료 결제가 필요하다.
          gemini_model: '${{ vars.GEMINI_MODEL || ''gemini-3.5-flash'' }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 12
              },
              "tools": {
                "core": ["read_file", "write_file", "glob", "search_file_content"]
              }
            }
          prompt: |-
            너는 이 저장소의 코드 리뷰어다. 저장소 루트의 GEMINI.md에 적힌 규칙이
            리뷰 기준이며, 그 안의 "절대 규칙"은 위반 시 반드시 지적해야 한다.

            `.gemini/pr.diff`가 이번 PR의 전체 diff이고, `.gemini/pr.json`에
            제목·본문·변경 파일 목록이 있다. 먼저 이 두 파일을 읽어라.

            리뷰 결과를 `.gemini/review.md` 파일에 마크다운으로 작성해라.
            이 파일의 내용이 그대로 PR 코멘트로 게시되므로, 인사말이나
            "작성했습니다" 같은 메타 문장 없이 리뷰 본문만 담아야 한다.

            형식:
            - 맨 위에 2~3줄 요약.
            - 그 아래 지적 사항을 심각도(Critical / High / Medium)별로 묶어라.
            - 각 항목은 `파일경로:라인` 을 밝히고, 무엇이 왜 문제인지 한 문단으로
              설명한 뒤 수정된 코드 예시를 코드블록으로 제시해라.
            - GEMINI.md의 절대 규칙 위반은 Critical 또는 High로 분류한다.
            - 취향 차이나 사소한 네이밍은 적지 마라. 지적할 게 없으면
              "규칙 위반 사항 없음"만 쓰고 끝내라.

            한국어로 작성해라. 반드시 write_file 도구로 `.gemini/review.md`를
            생성해야 하며, 그 외의 파일은 수정하지 마라.

      - name: 'Post review as PR comment'
        if: 'always()'
        run: |-
          if [ ! -s .gemini/review.md ]; then
            echo "리뷰 파일이 비어 있거나 생성되지 않았다 — 코멘트를 건너뛴다." >&2
            exit 1
          fi
          {
            echo "## 🤖 Gemini 코드 리뷰"
            echo
            cat .gemini/review.md
            echo
            echo "---"
            echo "<sub>\`${GEMINI_MODEL:-gemini-3.5-flash}\` · 다시 실행하려면 \`@gemini-cli /review\` 코멘트</sub>"
          } > .gemini/comment.md
          gh pr comment "${PR_NUMBER}" --body-file .gemini/comment.md
        env:
          GEMINI_MODEL: '${{ vars.GEMINI_MODEL }}'
